<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Ultimate Revision Archive</title>
  <link rel="icon" href="assets/images/left-logo.png" type="image/png">
  <meta name="description" content="A single GitHub Pages portal for all projects in this repository.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: #edf0ff;
      background:
        radial-gradient(circle at 14% 16%, rgba(96, 103, 228, 0.14), transparent 20%),
        radial-gradient(circle at 84% 14%, rgba(88, 132, 215, 0.1), transparent 18%),
        radial-gradient(circle at 52% 108%, rgba(96, 70, 168, 0.2), transparent 34%),
        linear-gradient(135deg, #090d1b 0%, #0d1121 18%, #13162a 42%, #111426 68%, #090c19 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 999px;
      filter: blur(90px);
    }

    body::before {
      width: 34rem;
      height: 34rem;
      top: -12rem;
      left: -10rem;
      opacity: 0.14;
      background: radial-gradient(circle, rgba(104, 91, 215, 0.74) 0%, rgba(104, 91, 215, 0) 68%);
    }

    body::after {
      width: 28rem;
      height: 28rem;
      right: -8rem;
      bottom: -8rem;
      opacity: 0.12;
      background: radial-gradient(circle, rgba(74, 112, 194, 0.68) 0%, rgba(74, 112, 194, 0) 70%);
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 10px 0 56px;
    }

    .header-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 2.4vw, 34px);
      height: clamp(120px, 32vw, 200px);
      margin-bottom: 2px;
    }

    .header-logo {
      flex: 0 0 auto;
      width: clamp(148px, 20vw, 240px);
      aspect-ratio: 612 / 408;
      background: url("assets/images/left-logo.png") center center / contain no-repeat;
      scale: 80%;
      margin-left: 50px;
      margin-right: -80px;
    }

    .header-wordmark {
      flex: 0 0 auto;
      width: min(1500px, 88vw);
      max-width: calc(100vw - 260px);
      height: clamp(156px, 24vw, 272px);
      background: url("assets/images/final-header-tp.png") center center / contain no-repeat;
      opacity: 1;
      scale: 90%;
      
    }

    .projects {
      padding: 28px;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(24, 24, 48, 0.86), rgba(17, 19, 37, 0.84));
      border: 1px solid rgba(146, 140, 226, 0.12);
      box-shadow: 0 26px 70px rgba(3, 7, 18, 0.48);
      backdrop-filter: blur(14px);
    }

    .projects-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: "Syne", "Trebuchet MS", sans-serif;
      letter-spacing: -0.04em;
      color: #eef1ff;
      text-transform: none;
    }

    .projects h2 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .project-card {
      position: relative;
      display: block;
      padding: 22px;
      border-radius: 24px;
      text-decoration: none;
      background:
        radial-gradient(circle at top right, rgba(101, 92, 196, 0.14), transparent 24%),
        linear-gradient(180deg, rgba(27, 27, 52, 0.98), rgba(18, 20, 39, 0.97));
      border: 1px solid rgba(137, 133, 214, 0.12);
      box-shadow: 0 18px 42px rgba(4, 8, 18, 0.34);
      overflow: hidden;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease, background 220ms ease;
    }

    .project-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(148, 142, 232, 0);
      box-shadow: 0 0 0 rgba(106, 96, 210, 0);
      transition: border-color 220ms ease, box-shadow 220ms ease;
      pointer-events: none;
    }

    .project-card:hover {
      transform: translateY(-3px);
      border-color: rgba(155, 150, 234, 0.22);
      box-shadow: 0 22px 44px rgba(5, 8, 18, 0.38);
      background:
        radial-gradient(circle at top right, rgba(112, 104, 218, 0.16), transparent 26%),
        linear-gradient(180deg, rgba(30, 30, 58, 0.99), rgba(20, 22, 43, 0.98));
    }

    .project-card:hover::after,
    .project-card:focus-visible::after {
      border-color: rgba(148, 142, 232, 0.24);
      box-shadow: inset 0 0 18px rgba(113, 102, 214, 0.1), 0 0 22px rgba(106, 96, 210, 0.12);
    }

    .project-card:focus-visible {
      outline: none;
      transform: translateY(-3px);
      border-color: rgba(155, 150, 234, 0.24);
      box-shadow: 0 22px 44px rgba(5, 8, 18, 0.38);
    }

    .project-card h3 {
      font-size: 1.35rem;
    }

    @media (max-width: 780px) {
      .page {
        width: min(100vw - 20px, 1120px);
        padding-top: 26px;
      }

      .header-strip {
        gap: 10px;
        height: clamp(132px, 30vw, 176px);
        margin-bottom: 10px;
      }

      .header-logo {
        width: clamp(96px, 22vw, 140px);
      }

      .header-wordmark {
        width: min(1500px, calc(100vw - 120px));
        max-width: none;
        height: clamp(78px, 18vw, 112px);
      }

      .projects {
        padding: 22px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="header-strip" aria-hidden="true">
      <div class="header-logo"></div>
      <div class="header-wordmark"></div>
    </div>

    <section class="projects" id="projects">
      <div class="projects-head">
        <h2>Chapters</h2>
      </div>

      <div class="grid">
        <!-- Copy one project-card block, paste it below, then change the title and href. -->

        <a class="project-card" href="topic/ITF/">
          <h3>Inverse Trigonometry Function</h3>
        </a>

        <a class="project-card" href="topic/Coordinate/">
          <h3>Coordinate Geometry</h3>
        </a>


        <a class="project-card" href="topic/Integration/">
          <h3>Integration</h3>
        </a>
        
        <a class="project-card" href="topic/Probability&PNC/">
          <h3>P&C and Probability</h3>
        </a>

        <a class="project-card" href="topic/Vector&3D/">
          <h3>Vector & 3D Geometry</h3>
        </a>


      </div>
    </section>
  </main>
</body>
</html>
